<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Combattant Élite — Zacair</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --or:#C9A84C;--or2:#E8C97A;--or3:#F5E9C8;
  --noir:#0C0C0C;--n2:#161616;--n3:#202020;--n4:#2A2A2A;--n5:#333;
  --g1:#5A5A5A;--g2:#888;--g3:#BBB;
  --blanc:#F4F2ED;
  --p0:#5B9BD4;--p1:#C9A84C;--p2:#D4603A;--p3:#3DAF6B;
  --r:10px;--safe:env(safe-area-inset-bottom,16px)
}
html,body{height:100%;background:var(--noir);color:var(--blanc);font-family:'DM Sans',sans-serif;overflow:hidden}
#app{height:100%;display:flex;flex-direction:column;overflow:hidden;position:relative}

/* ─── HEADER ─── */
.hdr{
  flex-shrink:0;background:var(--n2);
  border-bottom:1px solid rgba(201,168,76,.12);
  padding:12px 16px 10px;
  display:flex;align-items:center;gap:10px;
  position:relative;z-index:20
}
.hdr-back{
  background:var(--n3);border:none;color:var(--g2);
  width:36px;height:36px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:18px;cursor:pointer;flex-shrink:0;transition:.2s
}
.hdr-back:active{background:var(--n4)}
.hdr-info{flex:1;min-width:0}
.hdr-sub{font-size:10px;letter-spacing:2px;color:var(--or);font-family:'Bebas Neue';margin-bottom:1px}
.hdr-title{font-family:'Bebas Neue';font-size:20px;letter-spacing:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hdr-right{flex-shrink:0}
.hdr-ring{width:36px;height:36px;position:relative}
.hdr-ring svg{width:36px;height:36px;transform:rotate(-90deg)}
.hdr-ring circle{fill:none;stroke-width:3}
.hdr-ring .track{stroke:var(--n4)}
.hdr-ring .fill{stroke:var(--or);stroke-linecap:round;transition:stroke-dashoffset .6s ease}
.hdr-pct{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:var(--or)}

/* ─── BOTTOM NAV ─── */
.bottom-nav{
  flex-shrink:0;
  background:var(--n2);border-top:1px solid rgba(255,255,255,.05);
  display:flex;padding-bottom:var(--safe);
  position:relative;z-index:20
}
.bn-item{
  flex:1;display:flex;flex-direction:column;align-items:center;
  gap:3px;padding:10px 0;cursor:pointer;transition:.2s;border:none;background:none;color:var(--g1)
}
.bn-item.active{color:var(--or)}
.bn-item:active{opacity:.7}
.bn-icon{font-size:20px;line-height:1}
.bn-lbl{font-size:10px;letter-spacing:1px;font-family:'Bebas Neue'}

/* ─── SCROLL ─── */
.scroll{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding-bottom:8px}

/* ─── HOME ─── */
.home-hero{
  padding:20px 16px 16px;
  background:linear-gradient(180deg,var(--n2) 0%,transparent 100%)
}
.home-greeting{font-size:13px;color:var(--g2);margin-bottom:2px}
.home-title{font-family:'Bebas Neue';font-size:32px;letter-spacing:1px;line-height:1}
.home-day{font-size:12px;color:var(--or);margin-top:4px;font-weight:600}

.home-ring-wrap{
  margin:16px;padding:20px;
  background:var(--n2);border:1px solid rgba(255,255,255,.06);border-radius:var(--r);
  display:flex;align-items:center;gap:20px
}
.big-ring{width:80px;height:80px;position:relative;flex-shrink:0}
.big-ring svg{width:80px;height:80px;transform:rotate(-90deg)}
.big-ring circle{fill:none;stroke-width:5}
.big-ring .track{stroke:var(--n4)}
.big-ring .fill{stroke:var(--or);stroke-linecap:round;transition:.8s ease}
.big-ring-pct{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.big-ring-num{font-family:'Bebas Neue';font-size:22px;color:var(--or);line-height:1}
.big-ring-sub{font-size:9px;color:var(--g2);letter-spacing:1px}
.home-stats{flex:1;display:flex;flex-direction:column;gap:8px}
.home-stat{display:flex;justify-content:space-between;align-items:center}
.home-stat-lbl{font-size:12px;color:var(--g2)}
.home-stat-val{font-family:'Bebas Neue';font-size:18px;color:var(--blanc)}

.home-next{margin:0 16px 16px}
.home-next-title{font-size:11px;letter-spacing:2px;color:var(--or);font-family:'Bebas Neue';margin-bottom:10px}
.next-card{
  background:var(--n2);border:1px solid rgba(201,168,76,.2);
  border-radius:var(--r);padding:16px;
  display:flex;align-items:center;gap:14px;cursor:pointer;
  transition:.25s ease;position:relative;overflow:hidden
}
.next-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--or)}
.next-card:active{opacity:.8}
.next-card-icon{
  width:48px;height:48px;border-radius:50%;
  background:rgba(201,168,76,.1);border:2px solid rgba(201,168,76,.3);
  display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0
}
.next-card-info{flex:1;min-width:0}
.next-card-week{font-size:10px;color:var(--g2);letter-spacing:1px;text-transform:uppercase;margin-bottom:2px}
.next-card-name{font-family:'Bebas Neue';font-size:18px;letter-spacing:1px;line-height:1.1}
.next-card-meta{font-size:12px;color:var(--g2);margin-top:3px}
.next-card-arrow{color:var(--or);font-size:20px;flex-shrink:0}

.home-phases{margin:0 16px 16px}
.hp-title{font-size:11px;letter-spacing:2px;color:var(--g1);font-family:'Bebas Neue';margin-bottom:10px}
.hp-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.hp-item{
  padding:12px 8px;background:var(--n2);border-radius:var(--r);
  border:1px solid rgba(255,255,255,.05);text-align:center
}
.hp-item-pct{font-family:'Bebas Neue';font-size:20px;line-height:1;margin-bottom:2px}
.hp-item-lbl{font-size:9px;color:var(--g2);letter-spacing:1px;line-height:1.3}

.home-recent{margin:0 16px 16px}
.hr-title{font-size:11px;letter-spacing:2px;color:var(--g1);font-family:'Bebas Neue';margin-bottom:10px}
.hr-item{
  display:flex;align-items:center;gap:12px;
  padding:10px 0;border-bottom:1px solid rgba(255,255,255,.04)
}
.hr-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.hr-name{flex:1;font-size:13px;color:var(--g3)}
.hr-time{font-size:11px;color:var(--g1)}

/* ─── TIMELINE ─── */
.tl-hero{padding:20px 16px 0;background:linear-gradient(180deg,var(--n2) 0%,transparent 100%)}
.tl-brand{font-size:10px;letter-spacing:3px;color:var(--or);font-family:'Bebas Neue';margin-bottom:4px}
.tl-title{font-family:'Bebas Neue';font-size:46px;line-height:.9;margin-bottom:6px}
.tl-title span{color:var(--or)}
.tl-desc{font-size:13px;color:var(--g2);font-weight:300;margin-bottom:16px;line-height:1.5}
.pbar-wrap{display:grid;grid-template-columns:repeat(90,1fr);gap:1.5px;margin:0 16px 6px}
.pbar-day{height:4px;border-radius:1px;background:var(--n4)}
.pbar-day.s0{background:rgba(91,155,212,.6)}
.pbar-day.p1{background:rgba(201,168,76,.5)}
.pbar-day.p2{background:rgba(212,96,58,.6)}
.pbar-day.p3{background:rgba(61,175,107,.7)}
.pbar-day.test{background:var(--or);box-shadow:0 0 4px rgba(201,168,76,.8)}
.tl-milestones{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin:0 16px 20px}
.tl-ms{text-align:center;padding:8px 4px;border-top:2px solid var(--n4)}
.tl-ms.done{border-top-color:var(--or)}
.tl-ms-day{font-family:'Bebas Neue';font-size:18px;color:var(--or)}
.tl-ms-lbl{font-size:9px;color:var(--g1);letter-spacing:1px;text-transform:uppercase;margin-top:2px;line-height:1.2}
.tl-phase{margin:0 16px 8px;padding:10px 14px;border-left:3px solid var(--phase-c);background:rgba(255,255,255,.02)}
.tl-phase-tag{font-size:10px;letter-spacing:2px;color:var(--phase-c);font-family:'Bebas Neue';margin-bottom:1px}
.tl-phase-name{font-family:'Bebas Neue';font-size:21px;letter-spacing:2px}
.tl-phase-days{font-size:11px;color:var(--g1);margin-top:1px}

.wk-card{
  margin:0 16px 8px;background:var(--n2);
  border:1px solid rgba(255,255,255,.06);border-radius:var(--r);
  padding:14px;cursor:pointer;position:relative;overflow:hidden;transition:.25s ease
}
.wk-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--wc);opacity:.6;transition:opacity .25s}
.wk-card.locked{opacity:.4;cursor:default}
.wk-card.completed::before{opacity:1}
.wk-card:not(.locked):active{transform:scale(.98);background:var(--n3)}
.wk-head{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.wk-badge{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;background:var(--n4);border:2px solid var(--n4)}
.wk-badge.unlocked{border-color:var(--wc)}
.wk-badge.completed{background:var(--wc);border-color:var(--wc)}
.wk-info{flex:1;min-width:0}
.wk-num{font-size:10px;letter-spacing:2px;color:var(--g1);text-transform:uppercase}
.wk-name{font-family:'Bebas Neue';font-size:19px;letter-spacing:1px;line-height:1}
.wk-focus{font-size:12px;color:var(--g2);line-height:1.5;margin-bottom:10px;font-style:italic}
.wk-sessions{display:grid;grid-template-columns:repeat(4,1fr);gap:5px}
.wk-sess-dot{height:4px;border-radius:2px;background:var(--n4)}
.wk-sess-dot.done{background:var(--wc)}
.wk-status{font-size:10px;margin-top:6px}

/* ─── WEEK VIEW ─── */
.wv-hero{padding:18px 16px;background:linear-gradient(180deg,var(--n2) 0%,transparent 100%)}
.wv-phase{font-size:10px;letter-spacing:2px;color:var(--phase-c);font-family:'Bebas Neue';margin-bottom:3px}
.wv-title{font-family:'Bebas Neue';font-size:36px;line-height:.95;margin-bottom:4px}
.wv-sub{font-size:13px;color:var(--g2);font-style:italic;margin-bottom:14px}
.wv-prog{display:flex;gap:5px;margin-bottom:4px}
.wv-prog-item{flex:1;height:4px;border-radius:2px;background:var(--n4)}
.wv-prog-item.done{background:var(--phase-c)}
.wv-prog-lbl{font-size:10px;color:var(--g1);letter-spacing:1px}

.sess-card{margin:10px 16px 0;background:var(--n2);border:1px solid rgba(255,255,255,.06);border-radius:var(--r);overflow:hidden;cursor:pointer;transition:.25s ease}
.sess-card.locked{opacity:.4;cursor:default;pointer-events:none}
.sess-card:not(.locked):active{opacity:.8}
.sess-card-head{display:flex;align-items:center;gap:12px;padding:14px 16px}
.sess-icon{width:42px;height:42px;border-radius:50%;background:var(--n4);border:2px solid var(--n4);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.sess-icon.done{background:var(--phase-c);border-color:var(--phase-c)}
.sess-icon.active{border-color:var(--phase-c)}
.sess-info{flex:1;min-width:0}
.sess-title{font-family:'Bebas Neue';font-size:17px;letter-spacing:1px;line-height:1.1}
.sess-meta{font-size:11px;color:var(--g1);margin-top:3px}
.sess-arrow{color:var(--g1);font-size:16px}
.sess-done-bar{height:3px;background:var(--phase-c);transition:width .4s ease}

.mob-card{margin:10px 16px 0;background:rgba(91,155,212,.05);border:1px solid rgba(91,155,212,.2);border-radius:var(--r);overflow:hidden;cursor:pointer;transition:.25s ease}
.mob-card.locked{opacity:.4;cursor:default;pointer-events:none}
.mob-card:not(.locked):active{opacity:.8}
.mob-card-head{display:flex;align-items:center;gap:12px;padding:14px 16px}
.mob-icon{width:42px;height:42px;border-radius:50%;background:rgba(91,155,212,.1);border:2px solid rgba(91,155,212,.3);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.mob-icon.done{background:#5B9BD4;border-color:#5B9BD4}

.wv-bilan{margin:16px 16px 0;padding:14px;background:rgba(201,168,76,.05);border:1px solid rgba(201,168,76,.2);border-radius:var(--r)}
.wv-bilan-title{font-family:'Bebas Neue';font-size:14px;letter-spacing:2px;color:var(--or);margin-bottom:8px}
.wv-bilan-item{display:flex;align-items:flex-start;gap:8px;margin-bottom:5px;font-size:12px;color:var(--g2);line-height:1.4}
.wv-bilan-item::before{content:'→';color:var(--or);flex-shrink:0;margin-top:1px}

/* ─── SESSION VIEW ─── */
.sv-hero{padding:14px 16px 10px;background:var(--n2)}
.sv-phase{font-size:10px;letter-spacing:2px;color:var(--phase-c);font-family:'Bebas Neue';margin-bottom:2px}
.sv-title{font-family:'Bebas Neue';font-size:24px;letter-spacing:1px;line-height:1.1;margin-bottom:4px}
.sv-meta{font-size:11px;color:var(--g1)}

.sv-actions{display:flex;gap:10px;margin:12px 16px}
.sv-btn-start{
  flex:1;background:var(--phase-c);color:var(--noir);
  border:none;border-radius:var(--r);padding:14px;
  font-family:'Bebas Neue';font-size:17px;letter-spacing:2px;
  cursor:pointer;transition:.25s ease;display:flex;align-items:center;justify-content:center;gap:8px
}
.sv-btn-start:active{opacity:.8}
.sv-btn-start.done{background:var(--p3);color:#fff}
.sv-btn-complete{
  flex:1;background:var(--n3);color:var(--g3);
  border:1px solid rgba(255,255,255,.1);border-radius:var(--r);padding:14px;
  font-family:'Bebas Neue';font-size:14px;letter-spacing:1px;
  cursor:pointer;transition:.25s ease
}
.sv-btn-complete.done{background:var(--p3);color:#fff;border-color:transparent}
.sv-btn-complete:active{opacity:.8}

.sect{margin:18px 16px 8px;font-family:'Bebas Neue';font-size:12px;letter-spacing:3px;color:var(--g1)}

/* ─── EXERCISE CARD ─── */
.ex-item{
  margin:0 16px 8px;
  background:var(--n2);border:1px solid rgba(255,255,255,.06);border-radius:var(--r);overflow:hidden;
  transition:.2s ease
}
.ex-item.checked{border-color:rgba(201,168,76,.2);background:rgba(201,168,76,.03)}
.ex-main{display:flex;align-items:flex-start;gap:10px;padding:12px 14px 10px}
.ex-check{
  width:22px;height:22px;border-radius:50%;border:2px solid var(--n5);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
  margin-top:2px;cursor:pointer;transition:.2s;background:transparent
}
.ex-item.checked .ex-check{background:var(--phase-c);border-color:var(--phase-c)}
.ex-check svg{display:none;width:11px;height:11px}
.ex-item.checked .ex-check svg{display:block}
.ex-body{flex:1;min-width:0}
.ex-name{font-family:'Bebas Neue';font-size:16px;letter-spacing:1px;line-height:1.3;margin-bottom:6px;text-transform:uppercase}
.ex-name a{color:var(--or2);text-decoration:none}
.ex-name a:active{opacity:.7}
.ex-name .no-link{color:var(--blanc)}
.ex-params{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:0}
.ex-param{font-size:11px;color:var(--g2);background:var(--n4);padding:2px 8px;border-radius:12px}

/* WHY section */
.ex-why{
  margin:0 14px 10px;padding:9px 12px;
  background:rgba(255,255,255,.025);
  border-left:2px solid rgba(201,168,76,.3);
  border-radius:0 6px 6px 0;
  font-size:12px;color:var(--g2);line-height:1.6;font-style:italic
}
.ex-why strong{color:var(--g3);font-style:normal}

/* Mobility */
.mob-desc{margin:0 14px 10px;padding:9px 12px;background:rgba(91,155,212,.06);border-radius:6px;font-size:12px;color:var(--g2);line-height:1.6;font-style:italic}

/* notes */
.notes-section{margin:16px 16px 0}
.notes-lbl{font-size:11px;letter-spacing:2px;color:var(--or);font-family:'Bebas Neue';margin-bottom:8px}
.notes-ta{width:100%;background:var(--n2);border:1px solid rgba(255,255,255,.1);border-radius:var(--r);color:var(--g3);font-family:'DM Sans';font-size:13px;padding:12px;resize:none;min-height:90px;line-height:1.5}
.notes-ta:focus{outline:none;border-color:rgba(201,168,76,.4)}
.notes-ta::placeholder{color:var(--g1)}
.congrats{margin:14px 16px 0;padding:14px;background:rgba(61,175,107,.08);border:1px solid rgba(61,175,107,.3);border-radius:var(--r);text-align:center}
.congrats-emoji{font-size:32px;margin-bottom:6px}
.congrats-title{font-family:'Bebas Neue';font-size:20px;color:#3DAF6B;letter-spacing:2px;margin-bottom:4px}
.congrats-text{font-size:13px;color:var(--g2);line-height:1.5}

/* ─── WORKOUT MODE ─── */
.workout-overlay{
  position:fixed;inset:0;z-index:100;
  background:var(--noir);
  display:flex;flex-direction:column;
  opacity:0;pointer-events:none;transition:opacity .3s ease
}
.workout-overlay.active{opacity:1;pointer-events:all}
.wo-header{
  padding:16px 16px 12px;
  display:flex;align-items:center;gap:12px;
  border-bottom:1px solid rgba(255,255,255,.06);flex-shrink:0
}
.wo-close{background:var(--n3);border:none;color:var(--g2);width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;cursor:pointer;flex-shrink:0}
.wo-title-area{flex:1;min-width:0}
.wo-sess-title{font-family:'Bebas Neue';font-size:16px;letter-spacing:1px;color:var(--g2)}
.wo-progress-text{font-size:12px;color:var(--or);font-weight:600;margin-top:2px}
.wo-progress-bar{height:3px;background:var(--n4);margin-top:8px;border-radius:2px;overflow:hidden;flex-shrink:0}
.wo-progress-fill{height:100%;background:var(--or);border-radius:2px;transition:width .4s ease}

.wo-body{flex:1;overflow-y:auto;padding:0 16px 20px;display:flex;flex-direction:column;gap:0;-webkit-overflow-scrolling:touch}

.wo-ex-num{
  font-family:'Bebas Neue';font-size:80px;color:rgba(201,168,76,.08);
  line-height:1;margin:16px 0 -16px;user-select:none
}
.wo-ex-name{font-family:'Bebas Neue';font-size:clamp(26px,6vw,36px);line-height:1;margin-bottom:14px;letter-spacing:.5px;text-transform:uppercase}
.wo-ex-name a{color:var(--or2);text-decoration:none}
.wo-ex-name .no-link{color:var(--blanc)}

.wo-params{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.wo-param{
  flex:1;min-width:80px;
  background:var(--n2);border:1px solid rgba(255,255,255,.06);
  border-radius:var(--r);padding:12px;text-align:center
}
.wo-param-icon{font-size:20px;margin-bottom:4px}
.wo-param-val{font-family:'Bebas Neue';font-size:20px;color:var(--or);line-height:1}
.wo-param-lbl{font-size:10px;color:var(--g2);letter-spacing:1px;margin-top:2px}

.wo-why{
  padding:12px 14px;
  background:rgba(255,255,255,.025);
  border-left:2px solid rgba(201,168,76,.3);
  border-radius:0 8px 8px 0;
  font-size:13px;color:var(--g2);line-height:1.7;font-style:italic;margin-bottom:16px
}
.wo-why strong{color:var(--g3);font-style:normal}

.wo-mob-desc{padding:12px 14px;background:rgba(91,155,212,.06);border-radius:8px;font-size:13px;color:var(--g2);line-height:1.7;font-style:italic;margin-bottom:16px}

/* Rest timer */
.wo-rest{
  display:none;flex-direction:column;align-items:center;justify-content:center;
  padding:24px 0;gap:12px
}
.wo-rest.active{display:flex}
.wo-rest-title{font-size:12px;letter-spacing:2px;color:var(--g2);text-transform:uppercase;font-family:'Bebas Neue'}
.wo-rest-ring{position:relative;width:110px;height:110px}
.wo-rest-ring svg{width:110px;height:110px;transform:rotate(-90deg)}
.wo-rest-ring circle{fill:none;stroke-width:5}
.wo-rest-ring .rt{stroke:var(--n4)}
.wo-rest-ring .rf{stroke:var(--p3);stroke-linecap:round;transition:stroke-dashoffset 1s linear}
.wo-rest-num{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue';font-size:36px;color:var(--p3)}

function getVideo(name){
  const n=name.toLowerCase().replace(/[()0-9%']/g,'').replace(/\s+/g,' ').trim();
  for(const[k,v]of Object.entries(V)){if(n===k)return`https://youtube.com/shorts/${v}`;}
  for(const[k,v]of Object.entries(V)){if(n.startsWith(k))return`https://youtube.com/shorts/${v}`;}
  for(const[k,v]of Object.entries(V)){if(n.includes(k))return`https://youtube.com/shorts/${v}`;}
  return null;
}

}

function getWhy(name){
  const n=name.toLowerCase().replace(/[()0-9%']/g,'').replace(/\s+/g,' ').trim();
  for(const[k,v]of Object.entries(WHY)){if(n.includes(k.toLowerCase()))return v;}
  // try partial
  const words=n.split(' ');
  for(const[k,v]of Object.entries(WHY)){
    const kw=k.toLowerCase().split(' ');
    if(kw.length>=2&&kw.every(w=>n.includes(w)))return v;
  }
  return null;
}

function getSSMap(wi,si){return SUPERSETS[PROGRAM[wi].sessions[si].id]||{};}
function ssPrefix(label){return label?label.slice(0,-1):null;}
function getSSGroup(ssMap,exIdx){
  const label=ssMap[exIdx];
  if(!label)return[exIdx];
  const pfx=ssPrefix(label);
  return Object.keys(ssMap).map(Number).filter(k=>ssMap[k]&&ssPrefix(ssMap[k])===pfx).sort((a,b)=>a-b);
}
function isFirstInGroup(ssMap,exIdx){
  const grp=getSSGroup(ssMap,exIdx);
  return grp[0]===exIdx;
}
function isLastInGroup(ssMap,exIdx){
  const grp=getSSGroup(ssMap,exIdx);
  return grp[grp.length-1]===exIdx;
}
function nextGroupStart(ssMap,exIdx,total){
  const grp=getSSGroup(ssMap,exIdx);
  return Math.min(Math.max(...grp)+1,total);
}
function countGroups(ssMap,total){
  const seen=new Set();let g=0;
  for(let i=0;i<total;i++){
    const lbl=ssMap[i];const pfx=lbl?ssPrefix(lbl):null;
    const key=pfx||'__'+i;
    if(!seen.has(key)){seen.add(key);g++;}
  }
  return g;
}
function groupIndex(ssMap,exIdx){
  const seen=new Set();let g=0;
  const total=exIdx+10;
  for(let i=0;i<=exIdx;i++){
    const lbl=ssMap[i];const pfx=lbl?ssPrefix(lbl):null;
    const key=pfx||'__'+i;
    if(!seen.has(key)){seen.add(key);if(i===exIdx||(lbl&&getSSGroup(ssMap,i).includes(exIdx)))g=seen.size;}
  }
  return g;
}

let S={
  view:'home', tab:'home', weekIdx:null, sessIdx:null,
  progress:JSON.parse(localStorage.getItem('ce_prog')||'{}'),
  notes:JSON.parse(localStorage.getItem('ce_notes')||'{}'),
  checks:JSON.parse(localStorage.getItem('ce_checks')||'{}'),
};
function save(){localStorage.setItem('ce_prog',JSON.stringify(S.progress));localStorage.setItem('ce_notes',JSON.stringify(S.notes));localStorage.setItem('ce_checks',JSON.stringify(S.checks));}
function isSessDone(wi,si){return!!S.progress[`${wi}_${si}`];}
function isWeekUnlocked(wi){if(wi===0)return true;return PROGRAM[wi-1].sessions.every((_,si)=>isSessDone(wi-1,si));}
function isWeekDone(wi){return PROGRAM[wi].sessions.every((_,si)=>isSessDone(wi,si));}
function isSessUnlocked(wi,si){if(!isWeekUnlocked(wi))return false;return si===0||isSessDone(wi,si-1);}
function ckKey(wi,si,ei){return`${wi}_${si}_${ei}`;}
function totalDone(){let d=0;PROGRAM.forEach((w,wi)=>w.sessions.forEach((_,si)=>{if(isSessDone(wi,si))d++;}));return d;}
function totalSess(){return PROGRAM.reduce((a,w)=>a+w.sessions.length,0);}
function phasePct(phaseId){const ws=PROGRAM.filter(w=>w.phase===phaseId);const tot=ws.reduce((a,w)=>a+w.sessions.length,0);const done=ws.reduce((a,w,i)=>{const wi=PROGRAM.indexOf(w);return a+w.sessions.filter((_,si)=>isSessDone(wi,si)).length;},0);return tot?Math.round((done/tot)*100):0;}
function nextSession(){for(let wi=0;wi<PROGRAM.length;wi++){if(!isWeekUnlocked(wi))break;for(let si=0;si<PROGRAM[wi].sessions.length;si++){if(!isSessDone(wi,si)&&isSessUnlocked(wi,si))return{wi,si};}}return null;}
function getPC(phase){return{activation:'#5B9BD4',p1:'#C9A84C',p2:'#D4603A',p3:'#3DAF6B'}[phase]||'#C9A84C';}

let WO={active:false,wi:0,si:0,exIdx:0,restTimer:null,restTotal:0,restLeft:0};
function parseSeconds(str){if(!str||str==='—')return 0;const m=str.match(/(\d+)'(\d*)/);if(m)return parseInt(m[1])*60+(parseInt(m[2])||0);const s=str.match(/(\d+)\s*s/i);if(s)return parseInt(s[1]);const d=str.match(/(\d+)\s*min/i);if(d)return parseInt(d[1])*60;return 0;}
function startWorkout(wi,si){
  WO={active:true,wi,si,exIdx:0,restTimer:null,restTotal:0,restLeft:0};
  document.getElementById('wo').classList.add('active');
  renderWO();
}
function closeWorkout(){
  clearInterval(WO.restTimer);
  WO.active=false;
  document.getElementById('wo').classList.remove('active');
}
function renderWO(){
  const w=PROGRAM[WO.wi],s=w.sessions[WO.si];
  const total=s.exercises.length;
  const idx=WO.exIdx;
  const finished=idx>=total;
  const ssMap=getSSMap(WO.wi,WO.si);
  document.getElementById('wo-sess-title').textContent=s.title;
  document.getElementById('wo-progress-text').textContent=finished?'Séance terminée !':'Exercice '+(Math.min(idx+1,total))+' / '+total;
  document.getElementById('wo-fill').style.width=Math.min((idx/total)*100,100)+'%';
  const body=document.getElementById('wo-body');
  const footer=document.getElementById('wo-footer');

  if(finished){
    body.innerHTML='<div class="wo-done-screen active"><div class="wo-done-emoji">🔥</div><div class="wo-done-title">SÉANCE TERMINÉE !</div><div class="wo-done-sub">Tu as enchaîné tous les exercices. Marque la séance comme terminée ci-dessous.</div></div>';
    footer.innerHTML='<button class="wo-btn-next done-style" onclick="finishWO()">✓ Valider la séance</button>';
    return;
  }

  const ssLabel=ssMap[idx]||null;
  const grp=ssLabel?getSSGroup(ssMap,idx):null;
  const isSS=grp&&grp.length>1;

  if(isSS){
    // ─── SUPERSET — 1 EXERCICE À LA FOIS ───
    const ex=s.exercises[idx];
    const isMob=ex.isMobility;
    const checked=!!S.checks[ckKey(WO.wi,WO.si,idx)];
    const posInGrp=grp.indexOf(idx);
    const isLastInGrp=isLastInGroup(ssMap,idx);
    const nextInGrp=isLastInGrp?null:grp[posInGrp+1];
    const nextEx2=nextInGrp!==null?s.exercises[nextInGrp]:null;
    const restSec=isLastInGrp?parseSeconds(ex.rest):0;
    const totalInGrp=grp.length;

    let html='';

    // SS progress indicator
    html+='<div class="wo-ss-progress-bar">';
    grp.forEach(function(k,gi){
      const done2=!!S.checks[ckKey(WO.wi,WO.si,k)];
      const isCurrent=k===idx;
      html+='<div class="wo-ss-pip'+(isCurrent?' current':done2?' done':'')+'">';
      html+='<span class="wo-ss-pip-label">'+ssMap[k]+'</span>';
      html+='</div>';
      if(gi<grp.length-1) html+='<div class="wo-ss-pip-arrow">→</div>';
    });
    html+='</div>';

    // Step indicator
    html+='<div class="wo-ss-step-label">SUPERSET — ÉTAPE '+(posInGrp+1)+' / '+totalInGrp+'</div>';

    // Exercise name
    html+='<div class="wo-ex-num">'+String(idx+1).padStart(2,'0')+'</div>';

function nextEx(){
  clearInterval(WO.restTimer);
  const s=PROGRAM[WO.wi].sessions[WO.si];
  const ex=s.exercises[WO.exIdx];
  const restSec=parseSeconds(ex.rest);
  WO.exIdx++;
  if(restSec>0&&WO.exIdx<s.exercises.length){
    renderWO();
    startRest(restSec);
  } else {
    renderWO();
  }
}
function startRest(secs){
  const restDiv=document.getElementById('wo-rest');
  if(!restDiv)return;
  restDiv.classList.add('active');
  WO.restTotal=secs;WO.restLeft=secs;
  const circ=2*Math.PI*48;
  const update=()=>{
    const rf=document.getElementById('rf');
    const rn=document.getElementById('rt-num');
    if(!rf||!rn){clearInterval(WO.restTimer);return;}
    rn.textContent=WO.restLeft;
    rf.style.strokeDashoffset=circ*(1-WO.restLeft/WO.restTotal);
    if(WO.restLeft<=0){clearInterval(WO.restTimer);skipRest();}
    WO.restLeft--;
  };
  update();
  WO.restTimer=setInterval(update,1000);
}
function skipRest(){
  clearInterval(WO.restTimer);
  const restDiv=document.getElementById('wo-rest');
  if(restDiv)restDiv.classList.remove('active');
}
function toggleWOCheck(){
  const k=ckKey(WO.wi,WO.si,WO.exIdx);
  S.checks[k]=!S.checks[k];save();
  const btn=document.getElementById('wo-btn-check');
  if(btn){btn.classList.toggle('checked');btn.textContent=S.checks[k]?'✓ Exercice coché':'☐ \u00a0Marquer cet exercice';}
}
function finishWO(){
  S.progress[`${WO.wi}_${WO.si}`]=true;save();
  closeWorkout();toast('Séance validée ! 🔥');render();
}
document.getElementById('wo-close').addEventListener('click',closeWorkout);

  body.appendChild(nameLine);body.appendChild(params);

function renderSession(scroll){
  const wi=S.weekIdx,si=S.sessIdx,w=PROGRAM[wi],s=w.sessions[si];
  const pc=w.phaseColor,done_=isSessDone(wi,si),isMob=s.id==='mob';
  const ssMap=getSSMap(wi,si);
  const hero=document.createElement('div');hero.className='sv-hero';hero.style.setProperty('--phase-c',isMob?'#5B9BD4':pc);
  hero.innerHTML='<div class="sv-phase" style="color:'+(isMob?'#5B9BD4':pc)+'">'+(isMob?'MOBILITÉ & PRÉVENTION':w.num+' · '+w.title)+'</div><div class="sv-title">'+s.title+'</div><div class="sv-meta">'+s.exercises.length+' exercices'+(isMob?' · Descriptions détaillées':' · Clique sur le nom pour voir la vidéo')+'</div>';
  scroll.appendChild(hero);

  const acts=document.createElement('div');acts.className='sv-actions';
  if(!done_){
    const btnStart=document.createElement('button');btnStart.className='sv-btn-start';
    btnStart.style.setProperty('--phase-c',isMob?'#5B9BD4':pc);
    btnStart.innerHTML='▶ &nbsp;MODE SÉANCE';
    btnStart.addEventListener('click',function(){startWorkout(wi,si);});
    acts.appendChild(btnStart);
  }
  const btnComplete=document.createElement('button');btnComplete.className='sv-btn-complete'+(done_?' done':'');
  btnComplete.textContent=done_?'✓ Séance terminée':'Valider la séance';
  if(!done_){btnComplete.addEventListener('click',function(){S.progress[wi+'_'+si]=true;save();toast('Séance validée ! 🔥');render();});}
  acts.appendChild(btnComplete);
  scroll.appendChild(acts);

  const sect=document.createElement('div');sect.className='sect';sect.textContent=isMob?'EXERCICES DE MOBILITÉ':'EXERCICES';scroll.appendChild(sect);

  // Group exercises by superset
  const rendered=new Set();
  s.exercises.forEach(function(ex,ei){
    if(rendered.has(ei))return;
    const ssLabel=ssMap[ei]||null;
    const grp=ssLabel?getSSGroup(ssMap,ei):null;

    if(grp&&grp.length>1&&isFirstInGroup(ssMap,ei)){
      const pfx=ssPrefix(ssLabel);
      const grpDiv=document.createElement('div');grpDiv.className='ss-group';

      // Header
      const hdr=document.createElement('div');hdr.className='ss-header';
      const labels=grp.map(function(k){return ssMap[k];}).join(' + ');
      hdr.innerHTML='<div class="ss-header-left"><span class="ss-badge">SUPERSET</span><span class="ss-count">'+grp.length+' exercices</span></div><span class="ss-rule">⚡ SANS REPOS ENTRE</span>';
      grpDiv.appendChild(hdr);

      // Explanation
      const exp=document.createElement('div');exp.className='ss-explain';
      const names=grp.map(function(k){return s.exercises[k].name;});
      if(grp.length===2){
        exp.innerHTML='Enchaîne <strong>'+names[0]+'</strong> puis <strong>'+names[1]+'</strong> sans poser la barre ni reprendre ton souffle. Récupère uniquement après avoir terminé les 2 exercices.';
      } else {
        exp.innerHTML='Enchaîne les <strong>'+grp.length+' exercices dans l’ordre</strong> sans repos entre eux. Récupère uniquement après avoir tout enchaîné.';
      }
      grpDiv.appendChild(exp);

      // Visual order strip
      const ord=document.createElement('div');ord.className='ss-order';
      grp.forEach(function(k,idx){
        const step=document.createElement('span');step.className='ss-order-step';
        step.textContent=ssMap[k]+' — '+s.exercises[k].name;
        ord.appendChild(step);
        if(idx<grp.length-1){
          const arr=document.createElement('span');arr.className='ss-order-arrow';arr.textContent='→';
          ord.appendChild(arr);
        }
      });
      const then=document.createElement('span');then.className='ss-then';
      const lastEx=s.exercises[grp[grp.length-1]];
      then.textContent='puis repos '+lastEx.rest;
      ord.appendChild(then);
      grpDiv.appendChild(ord);

      grp.forEach(function(k){
        rendered.add(k);
        grpDiv.appendChild(buildExItem(wi,si,k,s.exercises[k],ssMap,pc,isMob));
      });
      scroll.appendChild(grpDiv);
    } else if(!grp||grp.length<=1){
      // Solo exercise
      rendered.add(ei);
      scroll.appendChild(buildExItem(wi,si,ei,ex,ssMap,pc,isMob));
    }
  });

  const ns=document.createElement('div');ns.className='notes-section';
  const nk=wi+'_'+si;
  ns.innerHTML='<div class="notes-lbl">NOTES DE SÉANCE</div><textarea class="notes-ta" id="notes-ta" placeholder="Charges utilisées, sensations, commentaires...">'+( S.notes[nk]||'')+'</textarea>';
  scroll.appendChild(ns);
  if(done_&&isWeekDone(wi)){const cg=document.createElement('div');cg.className='congrats';const isLast=wi===PROGRAM.length-1;cg.innerHTML='<div class="congrats-emoji">'+(isLast?'🏆':'🔓')+'</div><div class="congrats-title">'+(isLast?'PROGRAMME TERMINÉ !':'SEMAINE DÉBLOQUÉE !')+'</div><div class="congrats-text">'+(isLast?'Tu as terminé les 90 jours. Tu es un combattant élite.':'La semaine suivante est maintenant débloquée !')+'</div>';scroll.appendChild(cg);}
  const sp=document.createElement('div');sp.style.height='20px';scroll.appendChild(sp);
  setTimeout(function(){const ta=document.getElementById('notes-ta');if(ta)ta.addEventListener('input',function(){S.notes[nk]=ta.value;save();});},100);
}

// PROFILE STATE
// ══════════════════════════════════════════════
function loadProfile(){return JSON.parse(localStorage.getItem('ce_profile')||'[]');}
function saveProfile(entries){localStorage.setItem('ce_profile',JSON.stringify(entries));}
let profileForm={poids:'',feeling:0,sommeil:0,energie:0,notes:''};

// ══════════════════════════════════════════════
// PROFILE OVERLAY RENDER
// ══════════════════════════════════════════════
function openProfile(){
  document.getElementById('profile-overlay').classList.add('open');
  renderProfileScroll();
}
function closeProfile(){document.getElementById('profile-overlay').classList.remove('open');}

function renderProfileScroll(){
  const scroll=document.getElementById('profile-scroll');
  const entries=loadProfile();
  const today=new Date().toLocaleDateString('fr-FR',{weekday:'short',day:'numeric',month:'short'});
  const todayKey=new Date().toISOString().split('T')[0];
  const todayEntry=entries.find(e=>e.date===todayKey);
  if(todayEntry){profileForm={poids:todayEntry.poids,feeling:todayEntry.feeling,sommeil:todayEntry.sommeil,energie:todayEntry.energie,notes:todayEntry.notes};}

  const scaleHTML=(field,val)=>{let h='';for(let i=1;i<=10;i++){h+=`<button class="pf-scale-btn${val==i?' sel':''}" onclick="setPF('${field}',${i})">${i}</button>`;}return h;};

  scroll.innerHTML=`
  <div class="profile-hero">
    <div class="profile-hero-title">MON PROFIL</div>
    <div class="profile-hero-sub">${today} — Saisis ta progression du jour</div>
  </div>
  <div class="profile-form">
    <div class="profile-form-title">ENTRÉE DU JOUR</div>
    <div class="pf-row">
      <div class="pf-label">⚖️ Poids (kg)</div>
      <input class="pf-input" id="pf-poids" type="number" step="0.1" placeholder="ex: 78.5" value="${profileForm.poids}" oninput="profileForm.poids=this.value">
    </div>
    <div class="pf-row">
      <div class="pf-label">💭 Feeling général</div>
      <div class="pf-scale">${scaleHTML('feeling',profileForm.feeling)}</div>
    </div>
    <div class="pf-row">
      <div class="pf-label">😴 Qualité du sommeil</div>
      <div class="pf-scale">${scaleHTML('sommeil',profileForm.sommeil)}</div>
    </div>
    <div class="pf-row">
      <div class="pf-label">⚡ Énergie / Motivation</div>
      <div class="pf-scale">${scaleHTML('energie',profileForm.energie)}</div>
    </div>
    <div class="pf-row">
      <div class="pf-label">📝 Notes libres</div>
      <textarea class="pf-input notes-ta" rows="3" placeholder="Sensations, douleurs, remarques..." oninput="profileForm.notes=this.value">${profileForm.notes}</textarea>
    </div>
    <button class="pf-save-btn" onclick="saveProfileEntry()">ENREGISTRER L'ENTRÉE</button>
  </div>
  ${renderWeightChart(entries)}
  ${renderProfileHistory(entries)}`;
}

function setPF(field,val){
  profileForm[field]=val;
  renderProfileScroll();
}

function saveProfileEntry(){
  if(!profileForm.poids&&!profileForm.feeling){alert('Saisis au moins ton poids ou ton feeling !');return;}
  const entries=loadProfile();
  const key=new Date().toISOString().split('T')[0];
  const idx=entries.findIndex(e=>e.date===key);
  const entry={date:key,dateLabel:new Date().toLocaleDateString('fr-FR',{weekday:'short',day:'numeric',month:'short'}),...profileForm};
  if(idx>=0)entries[idx]=entry;else entries.unshift(entry);
  saveProfile(entries.slice(0,90));
  profileForm={poids:'',feeling:0,sommeil:0,energie:0,notes:''};
  renderProfileScroll();
  toast('Entrée sauvegardée ! 📊');
}

function renderWeightChart(entries){
  const withWeight=entries.filter(e=>e.poids).slice(0,30).reverse();
  if(withWeight.length<2)return`<div class="profile-chart"><div class="pc-title">COURBE DE POIDS</div><div class="pc-svg-wrap"><div class="pc-no-data">Saisis ton poids pendant au moins 2 jours pour voir la courbe.</div></div></div>`;
  const weights=withWeight.map(e=>parseFloat(e.poids));
  const minW=Math.min(...weights)-1;const maxW=Math.max(...weights)+1;
  const W=320,H=100,pad=10;
  const toX=(i)=>pad+(i/(withWeight.length-1))*(W-pad*2);
  const toY=(w)=>H-pad-((w-minW)/(maxW-minW))*(H-pad*2);
  let path=withWeight.map((e,i)=>`${i===0?'M':'L'}${toX(i).toFixed(1)},${toY(parseFloat(e.poids)).toFixed(1)}`).join(' ');
  const fillPath=path+` L${toX(withWeight.length-1).toFixed(1)},${H} L${toX(0).toFixed(1)},${H} Z`;
  const current=weights[weights.length-1];const start=weights[0];const diff=(current-start).toFixed(1);const sign=diff>0?'+':'';
  return`<div class="profile-chart"><div class="pc-title">COURBE DE POIDS <span style="color:var(--or);font-size:13px">${current} kg <span style="font-size:11px;color:${diff>0?'#D4603A':'#3DAF6B'}">(${sign}${diff} kg)</span></span></div>
  <div class="pc-svg-wrap"><svg class="pc-svg" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
    <defs><linearGradient id="wg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#C9A84C" stop-opacity="0.2"/><stop offset="100%" stop-color="#C9A84C" stop-opacity="0"/></linearGradient></defs>
    <path d="${fillPath}" fill="url(#wg)"/>
    <path d="${path}" fill="none" stroke="#C9A84C" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    ${withWeight.map((e,i)=>`<circle cx="${toX(i).toFixed(1)}" cy="${toY(parseFloat(e.poids)).toFixed(1)}" r="3" fill="#C9A84C"/>`).join('')}
  </svg></div></div>`;
}

function renderProfileHistory(entries){
  if(!entries.length)return'';
  const last=entries.slice(0,7);
  const metric=(v,label,max)=>v?('<span class="ph-metric">'+label+' '+v+(max?'/'+max:'')+'</span>'):'';
  const items=last.map(e=>{
    const notes=e.notes?('<div class="ph-notes">\"'+e.notes+'\"</div>'):'';
    return '<div class="ph-item"><div class="ph-date">'+e.dateLabel+'</div><div class="ph-metrics">'+metric(e.poids,'⚖️',false)+metric(e.feeling,'💭',10)+metric(e.sommeil,'😴',10)+metric(e.energie,'⚡',10)+'</div>'+notes+'</div>';
  }).join('');
  return '<div class="profile-history"><div class="ph-title">HISTORIQUE (7 DERNIERS JOURS)</div>'+items+'</div>';
}

document.getElementById('profile-close').addEventListener('click',closeProfile);

// NUTRITION OVERLAY RENDER
// ══════════════════════════════════════════════
let nutState={view:'home',section:null,morpho:null};

function openNutrition(){
  nutState={view:'home',section:null,morpho:null};
  document.getElementById('nutrition-overlay').classList.add('open');
  renderNutritionScroll();
}
function closeNutrition(){document.getElementById('nutrition-overlay').classList.remove('open');}

function renderNutritionScroll(){
  const scroll=document.getElementById('nutrition-scroll');
  const titleEl=document.getElementById('nut-ov-title');

  if(nutState.view==='home'){
    titleEl.textContent='NUTRITION';
    let h='<div class="nut-home">';
    h+='<div class="nut-home-title">NUTRITION<br><span style="color:var(--or)">COMBAT</span></div>';
    h+='<div class="nut-home-sub">Adapte ton alimentation à ton objectif. Chaque programme est décliné selon ton morphotype.</div>';
    h+='<div class="nut-card nut-card-seche" onclick="openNutSection(\'seche\')">';
    h+='<div class="nut-card-tag" style="color:#C9A84C">OBJECTIF PERTE DE GRAS</div>';
    h+='<div class="nut-card-title" style="color:#C9A84C">SÈCHE</div>';
    h+='<div class="nut-card-sub" style="color:#888">Déficit calorique contrôlé · Préservation musculaire · 3 morphotypes</div>';
    h+='<div class="nut-card-chips">';
    h+='<span class="nut-chip" style="background:rgba(201,168,76,.12);color:#C9A84C">Ectomorphe</span>';
    h+='<span class="nut-chip" style="background:rgba(201,168,76,.12);color:#C9A84C">Mésomorphe</span>';
    h+='<span class="nut-chip" style="background:rgba(201,168,76,.12);color:#C9A84C">Endomorphe</span>';
    h+='</div><div class="nut-card-arrow">›</div></div>';
    h+='<div class="nut-card nut-card-masse" onclick="openNutSection(\'masse\')">';
    h+='<div class="nut-card-tag" style="color:#3DAF6B">OBJECTIF CONSTRUCTION MUSCULAIRE</div>';
    h+='<div class="nut-card-title" style="color:#3DAF6B">PRISE DE MASSE</div>';
    h+='<div class="nut-card-sub" style="color:#888">Surplus calorique · Alimentation fractionnée · 5 à 6 repas/jour</div>';
    h+='<div class="nut-card-chips">';
    h+='<span class="nut-chip" style="background:rgba(61,175,107,.12);color:#3DAF6B">Ectomorphe</span>';
    h+='<span class="nut-chip" style="background:rgba(61,175,107,.12);color:#3DAF6B">Mésomorphe</span>';
    h+='<span class="nut-chip" style="background:rgba(61,175,107,.12);color:#3DAF6B">Endomorphe</span>';
    h+='</div><div class="nut-card-arrow">›</div></div></div>';
    scroll.innerHTML=h;

  } else if(nutState.view==='section'){
    const d=NUT[nutState.section];
    titleEl.textContent=d.title;
    const isMasse=nutState.section==='masse';
    const c=d.color;

    let timingOrCompHtml='';
    if(!isMasse){
      let th='';
      th+='<div class="nut-section-title" style="color:'+c+'">TIMING DES REPAS</div>';
      th+='<table class="nut-table"><thead><tr><th>Moment</th><th>Objectif</th><th>Contenu recommandé</th></tr></thead><tbody>';
      d.timing.forEach(function(t){th+='<tr><td><strong style="color:'+c+'">'+t.moment+'</strong></td><td>'+t.objectif+'</td><td>'+t.contenu+'</td></tr>';});
      th+='</tbody></table>';
      th+='<div class="nut-section-title" style="color:'+c+'">COMPLÉMENTS ALIMENTAIRES</div>';
      th+='<table class="nut-table"><thead><tr><th>Complément</th><th>Objectif</th><th>Remarque</th></tr></thead><tbody>';
      d.complements.forEach(function(t){th+='<tr><td><strong style="color:'+c+'">'+t.nom+'</strong></td><td>'+t.objectif+'</td><td>'+t.note+'</td></tr>';});
      th+='</tbody></table>';
      timingOrCompHtml=th;
    } else {
      let th='';
      th+='<div class="nut-section-title" style="color:'+c+'">ALIMENTS À PRIVILÉGIER</div>';
      d.aliments.forEach(function(a){
        var tags=a.tags.map(function(t){return '<span class="nut-tag">'+t+'</span>';}).join('');
        th+='<div class="nut-aliment-cat"><h4>'+a.emoji+' '+a.cat+'</h4><p>'+a.desc+'</p><div class="nut-tags">'+tags+'</div></div>';
      });
      th+='<div class="nut-section-title" style="color:'+c+'">TIMING DES COMPLÉMENTS</div>';
      d.complements.forEach(function(t){
        var items=t.items.map(function(i){return '→ '+i;}).join('<br>');
        th+='<div class="nut-info-box"><h4>'+t.moment+'</h4><p>'+items+'</p></div>';
      });
      th+='<div class="nut-section-title" style="color:'+c+'">À NE PAS FAIRE</div>';
      d.aNepasFaire.forEach(function(x){th+='<div class="nut-info-box"><p>⚠️ '+x+'</p></div>';});
      th+='<div class="nut-section-title" style="color:'+c+'">RÉSUMÉ EN 5 ÉTAPES</div>';
      th+='<div class="nut-steps">';
      d.resume.forEach(function(r,i){th+='<div class="nut-step"><div class="nut-step-num">'+(i+1)+'</div><div class="nut-step-text">'+r+'</div></div>';});
      th+='</div>';
      th+='<div class="nut-section-title" style="color:'+c+'">EXEMPLES DE JOURNÉES TYPES</div>';
      d.exemples.forEach(function(ex){
        var repasHtml=ex.repas.map(function(r){return '<div style="margin-bottom:6px"><strong style="color:'+c+';font-family:Bebas Neue;font-size:13px;letter-spacing:1px">'+r.titre+'</strong><br><span style="font-size:12px;color:#888">'+r.items.join(' · ')+'</span></div>';}).join('');
        th+='<div class="nut-info-box"><h4>'+ex.kcal+'</h4><p style="color:#888;margin-bottom:10px">'+ex.macros+'</p>'+repasHtml+'</div>';
      });
      timingOrCompHtml=th;
    }

    let h='<button class="nut-back-btn" onclick="nutGoBack()">← Retour nutrition</button>';
    h+='<div class="nut-section">';
    h+='<div class="nut-intro" style="border-left-color:'+c+'">'+d.intro+'</div>';
    h+='<div class="nut-section-title" style="color:'+c+'">NOTIONS DE BASE</div>';
    d.notions.forEach(function(n){h+='<div class="nut-info-box"><h4>'+n.title+'</h4><p>'+n.content+'</p></div>';});
    h+='<div class="nut-section-title" style="color:'+c+'">PAR MORPHOTYPE — CHOISIR LE TIEN</div>';
    h+='<div class="nut-morpho-grid">';
    d.morphotypes.forEach(function(m){
      var active=nutState.morpho===m.id?' active':'';
      h+='<div class="nut-morpho-btn'+active+'" onclick="setNutMorpho(this.dataset.id)" data-id="'+m.id+'">';
      h+='<div class="nut-morpho-icon">'+m.emoji+'</div>';
      h+='<div class="nut-morpho-name">'+m.name+'</div>';
      h+='<div class="nut-morpho-kcal">'+m.kcal+'</div></div>';
    });
    h+='</div>';
    if(nutState.morpho){h+=renderMorphoDetail(d,nutState.morpho);}
    else{h+='<div style="font-size:12px;color:var(--g1);text-align:center;padding:16px;font-style:italic">Sélectionne ton morphotype ci-dessus</div>';}
    h+=timingOrCompHtml;
    if(!isMasse){h+=renderFaq(d.faq,c);}
    h+='</div>';
    scroll.innerHTML=h;
  }
}

function renderMorphoDetail(d,morphoId){
  const m=d.morphotypes.find(x=>x.id===morphoId);
  if(!m)return'';
  const c=d.color;
  return`<div style="margin-bottom:12px">
    <div class="nut-info-box" style="border-left:3px solid ${c};border-radius:0 8px 8px 0">
      <h4>${m.emoji} ${m.name} — ${m.kcal}</h4>
      <p>${m.desc}</p>
      ${m.conseil?`<p style="margin-top:6px;color:var(--g3)">${m.conseil}</p>`:''}
    </div>
    <div class="nut-macros">${m.macros.map(mc=>`<div class="nut-macro"><div class="nut-macro-val">${mc.val}</div><div class="nut-macro-lbl">${mc.lbl}</div></div>`).join('')}</div>
    <div class="nut-section-title" style="color:${c}">REPAS TYPES — ${m.name}</div>
    ${m.repas.map(r=>{const itemsHtml=r.items.map(i=>'<div class="nut-meal-item">'+i+'</div>').join('');return '<div class="nut-meal"><div class="nut-meal-head"><div class="nut-meal-icon">'+r.icon+'</div><div class="nut-meal-title">'+r.titre+'</div></div><div class="nut-meal-items">'+itemsHtml+'</div></div>';}).join('')}
  </div>`;
}

function renderFaq(faq,c){
  const faqItems=faq.map((f,i)=>'<div class="nut-faq-item" id="faq-'+i+'"><div class="nut-faq-q" onclick="toggleFaq('+i+')"><span>'+f.q+'</span><span class="nut-faq-arrow">▼</span></div><div class="nut-faq-a">'+f.a+'</div></div>').join('');
  return'<div class="nut-section-title" style="color:'+c+'">FAQ</div>'+faqItems;
}

function toggleFaq(i){
  const el=document.getElementById('faq-'+i);
  if(el)el.classList.toggle('open');
}

function openNutSection(section){
  nutState.view='section';
  nutState.section=section;
  nutState.morpho=null;
  renderNutritionScroll();
  document.getElementById('nutrition-scroll').scrollTop=0;
}

function setNutMorpho(morpho){
  nutState.morpho=nutState.morpho===morpho?null:morpho;
  renderNutritionScroll();
  setTimeout(()=>{
    const el=document.querySelector('.nut-morpho-btn.active');
    if(el)el.scrollIntoView({behavior:'smooth',block:'nearest'});
  },100);
}

function nutGoBack(){
  nutState.view='home';nutState.section=null;nutState.morpho=null;
  renderNutritionScroll();
  document.getElementById('nutrition-scroll').scrollTop=0;
}

document.getElementById('nutrition-close').addEventListener('click',closeNutrition);


render();
</script>
